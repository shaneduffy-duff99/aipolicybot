<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPoli.ai — Access Logs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0B0C10;font-family:'Inter',sans-serif;min-height:100vh;color:#F3F4F6;padding:32px 24px;background-image:radial-gradient(circle at 50% 0%,rgba(16,185,129,.08) 0%,rgba(11,12,16,0) 50%)}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid #2A2D35}
    .logo .my{font-size:22px;font-weight:300;color:#6B7280}.logo .poli{font-size:22px;font-weight:700;color:#F3F4F6}.logo .ai{font-size:22px;font-weight:700;color:#10B981}
    .badge{font-size:11px;padding:3px 10px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:20px;color:#10B981;font-weight:600}
    h1{font-size:20px;font-weight:700;color:#F3F4F6;margin-bottom:4px}
    .sub{font-size:13px;color:#6B7280}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
    .stat{background:rgba(18,20,26,.82);border:1px solid #2A2D35;border-radius:12px;padding:16px}
    .stat-num{font-size:28px;font-weight:800;color:#F3F4F6}
    .stat-label{font-size:11px;color:#6B7280;margin-top:4px}
    .card{background:rgba(18,20,26,.82);border:1px solid #2A2D35;border-radius:12px;overflow:hidden;margin-bottom:20px}
    .card-header{padding:14px 20px;border-bottom:1px solid #2A2D35;display:flex;align-items:center;justify-content:space-between}
    .card-title{font-size:14px;font-weight:600;color:#F3F4F6}
    table{width:100%;border-collapse:collapse}
    th{padding:10px 20px;text-align:left;font-size:11px;color:#6B7280;font-weight:600;text-transform:uppercase;letter-spacing:.5px;background:#12141A;border-bottom:1px solid #2A2D35}
    td{padding:12px 20px;font-size:13px;border-bottom:1px solid rgba(42,45,53,.5)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    .pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
    .pill-green{background:rgba(16,185,129,.1);color:#10B981;border:1px solid rgba(16,185,129,.2)}
    .pill-blue{background:rgba(59,130,246,.1);color:#3B82F6;border:1px solid rgba(59,130,246,.2)}
    .pill-amber{background:rgba(245,158,11,.1);color:#F59E0B;border:1px solid rgba(245,158,11,.2)}
    .empty{padding:40px 20px;text-align:center;color:#6B7280;font-size:13px}
    .btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;border:1px solid #2A2D35;background:#12141A;color:#9CA3AF;transition:all .15s}
    .btn:hover{color:#F3F4F6;border-color:#4B5563}
    .btn-red{border-color:rgba(239,68,68,.3);color:#EF4444;background:rgba(239,68,68,.05)}
    .btn-red:hover{background:rgba(239,68,68,.1)}
    .admin-gate{position:fixed;inset:0;background:rgba(5,6,10,.95);backdrop-filter:blur(16px);z-index:100;display:flex;align-items:center;justify-content:center}
    .admin-card{background:rgba(18,20,26,.95);border:1px solid #2A2D35;border-radius:16px;padding:32px;width:90%;max-width:360px;text-align:center}
    .admin-card h2{font-size:17px;font-weight:700;margin-bottom:6px}
    .admin-card p{font-size:13px;color:#6B7280;margin-bottom:20px}
    .admin-input{width:100%;padding:10px 14px;background:#12141A;border:1px solid #2A2D35;border-radius:8px;font-size:13px;color:#F3F4F6;font-family:'Inter',sans-serif;text-align:center;letter-spacing:2px;outline:none;margin-bottom:12px}
    .admin-input:focus{border-color:#10B981}
    .admin-btn{width:100%;padding:11px;background:#10B981;color:#0B0C10;font-weight:700;font-size:13px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif}
    .admin-err{font-size:12px;color:#EF4444;margin-top:8px;min-height:16px}
  </style>
</head>
<body>

  <!-- ADMIN PASSWORD GATE -->

  <div class="admin-gate" id="adminGate">
    <div class="admin-card">
      <div style="font-size:28px;margin-bottom:12px">🔐</div>
      <h2>Admin Access</h2>
      <p>Enter admin password to view access logs</p>
      <input class="admin-input" type="password" id="adminPwd" placeholder="Admin password"
        onkeydown="if(event.key==='Enter')adminCheck()" autocomplete="off"/>
      <button class="admin-btn" onclick="adminCheck()">Access Logs →</button>
      <p class="admin-err" id="adminErr"></p>
    </div>
  </div>

  <!-- MAIN CONTENT -->

  <div id="mainContent" style="display:none;max-width:1000px;margin:0 auto">

  </div>

  <script>
    const ADMIN_PASSWORD = "mypoli2026";

    const CODE_COLORS = {
      "investor":       "pill-green",
      "demo":           "pill-blue",
      "designpartner1": "pill-amber",
      "designpartner2": "pill-amber",
      "designpartner3": "pill-amber",
      "designpartner4": "pill-amber",
      "designpartner5": "pill-amber"
    };

    function adminCheck() {
      const val = document.getElementById('adminPwd').value.trim();
      const err = document.getElementById('adminErr');
      if (val === ADMIN_PASSWORD) {
        sessionStorage.setItem('mypoli_admin', 'true');
        document.getElementById('adminGate').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        renderLogs();
      } else {
        err.textContent = 'Incorrect password.';
        document.getElementById('adminPwd').value = '';
      }
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) +
             ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    }

    function getDeviceType(ua) {
      if (/Mobile|iPhone|Android/.test(ua)) return '📱 Mobile';
      if (/iPad|Tablet/.test(ua)) return '📲 Tablet';
      return '💻 Desktop';
    }

    function renderLogs() {
      const log = JSON.parse(localStorage.getItem('mypoli_access_log') || '[]').reverse();
      const logCount = document.getElementById('logCount');
      logCount.textContent = log.length + ' total entries';

      // Stats
      const counts = {};
      log.forEach(e => { counts[e.label] = (counts[e.label]||0) + 1; });
      const uniqueCodes = Object.keys(counts).length;
      const today = new Date().toDateString();
      const todayCount = log.filter(e => new Date(e.time).toDateString() === today).length;

      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-num">${log.length}</div><div class="stat-label">Total accesses</div></div>
        <div class="stat"><div class="stat-num">${uniqueCodes}</div><div class="stat-label">Unique codes used</div></div>
        <div class="stat"><div class="stat-num">${todayCount}</div><div class="stat-label">Accesses today</div></div>
        <div class="stat"><div class="stat-num">${log.length > 0 ? formatTime(log[0].time).split(' ').slice(0,3).join(' ') : '—'}</div><div class="stat-label">Most recent access</div></div>
      `;

      // Table
      const tableDiv = document.getElementById('logTable');
      if (log.length === 0) {
        tableDiv.innerHTML = '<div class="empty">No access logs yet. Logs appear here when someone uses an access code.</div>';
        return;
      }

      tableDiv.innerHTML = `
        <table>
          <thead><tr>
            <th>#</th>
            <th>Date & Time</th>
            <th>Access Code</th>
            <th>Partner / Label</th>
            <th>Device</th>
          </tr></thead>
          <tbody>
            ${log.map((e, i) => `
              <tr>
                <td style="color:#4B5563">${log.length - i}</td>
                <td style="color:#9CA3AF">${formatTime(e.time)}</td>
                <td><span style="font-family:monospace;font-size:12px;color:#F3F4F6">${e.code}</span></td>
                <td><span class="pill ${CODE_COLORS[e.code]||'pill-blue'}">${e.label}</span></td>
                <td style="color:#6B7280;font-size:12px">${getDeviceType(e.ua)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      `;
    }

    function exportCSV() {
      const log = JSON.parse(localStorage.getItem('mypoli_access_log') || '[]');
      if (!log.length) { alert('No logs to export.'); return; }
      const rows = [['#','Date','Time','Code','Label','Device']];
      log.forEach((e, i) => {
        const d = new Date(e.time);
        rows.push([
          i+1,
          d.toLocaleDateString('en-GB'),
          d.toLocaleTimeString('en-GB'),
          e.code, e.label,
          getDeviceType(e.ua)
        ]);
      });
      const csv = rows.map(r => r.join(',')).join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = 'mypoli-access-logs.csv';
      a.click();
    }

    function clearLogs() {
      if (confirm('Clear all access logs? This cannot be undone.')) {
        localStorage.removeItem('mypoli_access_log');
        renderLogs();
      }
    }

    // Check admin session
    if (sessionStorage.getItem('mypoli_admin') === 'true') {
      document.getElementById('adminGate').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      renderLogs();
    } else {
      setTimeout(() => document.getElementById('adminPwd').focus(), 100);
    }
  </script>

</body>
</html>
