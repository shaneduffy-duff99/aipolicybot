<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPoli.ai — Access Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0B0C10;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle at 50% 0%, rgba(16,185,129,0.12) 0%, rgba(11,12,16,0) 60%);
    }
    .card {
      background: rgba(18,20,26,0.92);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(42,45,53,0.9);
      border-radius: 20px;
      padding: 40px 36px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    .logo { margin-bottom: 24px; }
    .logo span { font-size: 28px; font-weight: 700; }
    .logo .my   { color: #6B7280; font-weight: 300; }
    .logo .poli { color: #F3F4F6; }
    .logo .ai   { color: #10B981; }
    h1 { font-size: 18px; font-weight: 600; color: #F3F4F6; margin-bottom: 6px; }
    p  { font-size: 13px; color: #6B7280; margin-bottom: 28px; }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #12141A;
      border: 1px solid #2A2D35;
      border-radius: 10px;
      font-size: 14px;
      color: #F3F4F6;
      font-family: 'Inter', sans-serif;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
      transition: border .2s;
      margin-bottom: 14px;
    }
    input:focus { border-color: #10B981; }
    input.error { border-color: #EF4444; animation: shake .3s ease; }
    button {
      width: 100%;
      padding: 12px;
      background: #10B981;
      color: #0B0C10;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 0 20px rgba(16,185,129,0.3);
      transition: background .2s;
    }
    button:hover { background: #0ea371; }
    .error-msg {
      font-size: 12px;
      color: #EF4444;
      margin-top: 10px;
      display: none;
    }
    .hint {
      font-size: 11px;
      color: #4B5563;
      margin-top: 20px;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="my">my</span><span class="poli">poli</span><span class="ai">.ai</span>
    </div>
    <h1>Access Demo</h1>
    <p>Enter the access password to view the demo</p>
    <input
      type="password"
      id="pwd"
      placeholder="Enter password"
      onkeydown="if(event.key==='Enter')check()"
      autocomplete="off"
    />
    <button onclick="check()">Access Demo →</button>
    <p class="error-msg" id="err">Incorrect password. Please try again.</p>
    <p class="hint">Need access? Contact hello@mypoli.ai</p>
  </div>

  <script>
    // ── SET YOUR PASSWORD HERE ──
    const PASSWORD = "investor";

    // ── WHERE TO GO AFTER LOGIN ──
    const REDIRECT = "https://www.mypoli.ai/directory";

    function check() {
      const val = document.getElementById('pwd').value.trim().toLowerCase();
      const input = document.getElementById('pwd');
      const err = document.getElementById('err');

      if (val === PASSWORD.toLowerCase()) {
        // Store in sessionStorage — works across pages in same browser session
        sessionStorage.setItem('mypoli_auth', 'true');
        window.location.href = REDIRECT;
      } else {
        input.classList.add('error');
        err.style.display = 'block';
        setTimeout(() => input.classList.remove('error'), 400);
        input.value = '';
        input.focus();
      }
    }

    // If already authenticated in this session, skip gate
    if (sessionStorage.getItem('mypoli_auth') === 'true') {
      window.location.href = REDIRECT;
    }
  </script>

</body>
</html>
