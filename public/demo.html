<body>

    <button onclick="check()">Continue →</button>

function check() {
  const input = document.getElementById('pwd');
  const err = document.getElementById('err');
  const ok = document.getElementById('ok');
  const val = input.value.trim().toLowerCase();
  err.textContent = ''; ok.style.display = 'none';
  if (!val) { err.textContent = 'Please enter your access code.'; return; }
  const redirect = CODES[val];
  if (redirect) {
    // Log access
    const log = JSON.parse(localStorage.getItem('mypoli_access_log') || '[]');
    log.push({ code: val, label: LABELS[val]||val, time: new Date().toISOString(), ua: navigator.userAgent });
    localStorage.setItem('mypoli_access_log', JSON.stringify(log));
    // Session only — requires password on every new browser session
    sessionStorage.setItem('mypoli_auth', 'true');
    sessionStorage.setItem('mypoli_code', val);
    // Clear old persistent auth
    localStorage.removeItem('mypoli_auth');
    ok.style.display = 'block';
    input.style.borderColor = '#10B981';
    setTimeout(() => { window.location.href = redirect; }, 800);
  } else {
    input.classList.add('shake');
    err.textContent = 'Incorrect access code. Please try again.';
    setTimeout(() => { input.classList.remove('shake'); input.value = ''; input.focus(); }, 400);
  }
}

// Only skip if authenticated in THIS session
if (sessionStorage.getItem('mypoli_auth') === 'true') {
  const code = sessionStorage.getItem('mypoli_code') || 'investor';
  window.location.href = CODES[code] || 'https://www.mypoli.ai/directory.html';
}

// Clear old localStorage auth on every gate visit
localStorage.removeItem('mypoli_auth');

window.addEventListener('load', () => document.getElementById('pwd').focus());
