<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPoli.ai — Access Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0B0C10;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(circle at 50% 0%,rgba(16,185,129,.12) 0%,rgba(11,12,16,0) 60%)}
    .card{background:rgba(18,20,26,.92);backdrop-filter:blur(14px);border:1px solid rgba(42,45,53,.9);border-radius:20px;padding:40px 36px;width:90%;max-width:400px;text-align:center}
    .my{font-size:30px;font-weight:300;color:#6B7280}
    .poli{font-size:30px;font-weight:700;color:#F3F4F6}
    .ai{font-size:30px;font-weight:700;color:#10B981}
    .logo{margin-bottom:24px}
    h1{font-size:18px;font-weight:600;color:#F3F4F6;margin-bottom:6px}
    .sub{font-size:13px;color:#6B7280;margin-bottom:28px}
    input{width:100%;padding:12px 16px;background:#12141A;border:1px solid #2A2D35;border-radius:10px;font-size:14px;color:#F3F4F6;font-family:'Inter',sans-serif;text-align:center;letter-spacing:2px;outline:none;transition:border .2s;margin-bottom:14px}
    input:focus{border-color:#10B981}
    input.shake{animation:shake .3s ease;border-color:#EF4444}
    button{width:100%;padding:12px;background:#10B981;color:#0B0C10;font-weight:700;font-size:14px;border:none;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 0 20px rgba(16,185,129,.3)}
    button:hover{background:#0ea371}
    .err{font-size:12px;color:#EF4444;margin-top:10px;min-height:18px}
    .ok{display:none;font-size:13px;color:#10B981;margin-top:10px}
    .hint{font-size:11px;color:#4B5563;margin-top:20px}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="my">my</span><span class="poli">poli</span><span class="ai">.ai</span></div>
    <h1>Access Demo</h1>
    <p class="sub">Enter your access code to continue</p>
    <input type="password" id="pwd" placeholder="Enter access code"
      onkeydown="if(event.key==='Enter')check()" autocomplete="off"/>
    <button onclick="check()">Continue →</button>
    <p class="err" id="err"></p>
    <p class="ok" id="ok">✓ Access granted — redirecting...</p>
    <p class="hint">Need an access code? <a href="mailto:hello@mypoli.ai" style="color:#10B981;text-decoration:none">hello@mypoli.ai</a></p>
  </div>

  <script>
    var CODES = {
      "investor":       { url: "https://www.mypoli.ai/directory.html", label: "Investor" },
      "demo":           { url: "https://www.mypoli.ai/directory.html", label: "Demo" },
      "designpartner1": { url: "https://www.mypoli.ai/directory.html", label: "Goggin Insurances" },
      "designpartner2": { url: "https://www.mypoli.ai/directory.html", label: "Campion Insurance" },
      "designpartner3": { url: "https://www.mypoli.ai/directory.html", label: "Hastings Insurance" },
      "designpartner4": { url: "https://www.mypoli.ai/directory.html", label: "Compass Insurance" },
      "designpartner5": { url: "https://www.mypoli.ai/directory.html", label: "Dolmen Insurance" }
    };

    function check() {
      var input = document.getElementById('pwd');
      var err   = document.getElementById('err');
      var ok    = document.getElementById('ok');
      var val   = input.value.trim().toLowerCase();

      err.textContent = '';
      ok.style.display = 'none';

      if (!val) {
        err.textContent = 'Please enter your access code.';
        return;
      }

      var entry = CODES[val];

      if (entry) {
        ok.style.display = 'block';
        input.style.borderColor = '#10B981';

        // Fire tracking to Vercel function (non-blocking)
        try {
          fetch('/api/log-access', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: val, label: entry.label })
          });
        } catch(e) {
          // Silently fail — tracking never blocks the redirect
        }

        // Redirect after short delay
        setTimeout(function() {
          window.location.href = entry.url;
        }, 700);

      } else {
        input.classList.add('shake');
        err.textContent = 'Incorrect access code. Please try again.';
        setTimeout(function() {
          input.classList.remove('shake');
          input.value = '';
          input.focus();
        }, 400);
      }
    }

    document.getElementById('pwd').focus();
  </script>

</body>
</html>
