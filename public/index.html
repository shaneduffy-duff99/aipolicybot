<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mypoli.ai – Know What Your Policy Actually Covers</title>
  <meta name="description" content="AI-powered insurance analysis that reads the fine print so you don't have to.">
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    :root{
      --bg:#03050a;
      --text:#f3f5f8;
      --muted:#98a2b3;
      --panel:rgba(13,18,28,.68);
      --line:rgba(255,255,255,.12);
      --glow:rgba(79,124,255,.34);
      --button:#f4f4f5;
      --button-text:#121418;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 50% 65%, rgba(43,82,167,.26), transparent 22%),
                  radial-gradient(circle at 50% 74%, rgba(90,135,255,.18), transparent 30%),
                  linear-gradient(180deg, #02040a 0%, #02040a 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    body{
      position:relative;
      isolation:isolate;
    }

    .bg-noise,
    .bg-gradient,
    .bg-vignette,
    .horizon,
    .stars,
    .aurora{
      position:fixed;
      inset:0;
      pointer-events:none;
    }

    .bg-gradient{
      background:
        radial-gradient(circle at 50% 66%, rgba(66,104,214,.18), transparent 18%),
        radial-gradient(circle at 46% 76%, rgba(145,179,255,.12), transparent 24%),
        radial-gradient(circle at 80% 28%, rgba(72,91,255,.06), transparent 18%);
      filter: blur(18px);
      animation: pulseGlow 9s ease-in-out infinite alternate;
      z-index:-5;
    }

    .aurora::before,
    .aurora::after{
      content:"";
      position:absolute;
      width:54vw;
      height:54vw;
      border-radius:50%;
      background:radial-gradient(circle, rgba(85,135,255,.12), transparent 62%);
      filter: blur(16px);
      opacity:.9;
    }
    .aurora::before{
      left:18%;
      bottom:9%;
      animation: driftOne 18s ease-in-out infinite alternate;
    }
    .aurora::after{
      right:16%;
      bottom:5%;
      animation: driftTwo 22s ease-in-out infinite alternate;
    }

    /* Extra aurora layers for more animation */
    .aurora-extra{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-4;
    }
    .aurora-extra::before,
    .aurora-extra::after{
      content:"";
      position:absolute;
      border-radius:50%;
      filter: blur(60px);
    }
    .aurora-extra::before{
      width:40vw;
      height:40vw;
      background:radial-gradient(circle, rgba(100,60,255,.08), transparent 60%);
      top:10%;
      left:5%;
      animation: driftThree 25s ease-in-out infinite alternate;
    }
    .aurora-extra::after{
      width:35vw;
      height:35vw;
      background:radial-gradient(circle, rgba(60,140,255,.06), transparent 55%);
      top:20%;
      right:8%;
      animation: driftFour 20s ease-in-out infinite alternate;
    }

    /* Third aurora — deep sweep */
    .aurora-deep{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-5;
    }
    .aurora-deep::before,
    .aurora-deep::after{
      content:"";
      position:absolute;
      border-radius:50%;
      filter: blur(80px);
    }
    .aurora-deep::before{
      width:60vw;
      height:30vw;
      background:radial-gradient(ellipse, rgba(50,80,200,.1), transparent 65%);
      top:30%;
      left:-10%;
      animation: sweepLeft 30s ease-in-out infinite alternate;
    }
    .aurora-deep::after{
      width:50vw;
      height:25vw;
      background:radial-gradient(ellipse, rgba(80,50,220,.08), transparent 60%);
      top:15%;
      right:-8%;
      animation: sweepRight 26s ease-in-out infinite alternate;
    }

    /* Shooting stars */
    .shooting-stars{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-1;
      overflow:hidden;
    }
    .shooting-star{
      position:absolute;
      width:80px;
      height:1px;
      background:linear-gradient(90deg, rgba(180,200,255,.6), transparent);
      border-radius:1px;
      opacity:0;
      transform:rotate(-35deg);
    }
    .shooting-star:nth-child(1){
      top:12%; left:20%;
      animation: shoot 6s ease-in infinite 1s;
    }
    .shooting-star:nth-child(2){
      top:28%; left:65%;
      width:60px;
      animation: shoot 8s ease-in infinite 4s;
    }
    .shooting-star:nth-child(3){
      top:8%; left:45%;
      width:100px;
      animation: shoot 10s ease-in infinite 7s;
    }
    .shooting-star:nth-child(4){
      top:22%; left:80%;
      width:50px;
      animation: shoot 7s ease-in infinite 2.5s;
    }
    .shooting-star:nth-child(5){
      top:35%; left:10%;
      width:70px;
      animation: shoot 9s ease-in infinite 5.5s;
    }

    /* Floating particles layer */
    .particles{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-1;
      overflow:hidden;
    }
    .particle{
      position:absolute;
      width:2px;
      height:2px;
      background:rgba(140,180,255,.3);
      border-radius:50%;
      animation: floatUp linear infinite;
    }
    .particle:nth-child(1){ left:12%; animation-duration:14s; animation-delay:0s; width:3px; height:3px; }
    .particle:nth-child(2){ left:28%; animation-duration:18s; animation-delay:2s; }
    .particle:nth-child(3){ left:44%; animation-duration:12s; animation-delay:4s; width:2.5px; height:2.5px; }
    .particle:nth-child(4){ left:62%; animation-duration:20s; animation-delay:1s; }
    .particle:nth-child(5){ left:78%; animation-duration:16s; animation-delay:3s; width:3px; height:3px; }
    .particle:nth-child(6){ left:90%; animation-duration:22s; animation-delay:5s; }
    .particle:nth-child(7){ left:35%; animation-duration:15s; animation-delay:6s; }
    .particle:nth-child(8){ left:55%; animation-duration:19s; animation-delay:0.5s; width:2.5px; height:2.5px; }
    .particle:nth-child(9){ left:8%;  animation-duration:17s; animation-delay:7s; }
    .particle:nth-child(10){ left:72%; animation-duration:13s; animation-delay:2.5s; }
    .particle:nth-child(11){ left:18%; animation-duration:21s; animation-delay:1.5s; width:3px; height:3px; }
    .particle:nth-child(12){ left:50%; animation-duration:11s; animation-delay:8s; }
    .particle:nth-child(13){ left:84%; animation-duration:16s; animation-delay:3.5s; width:2.5px; height:2.5px; }
    .particle:nth-child(14){ left:3%;  animation-duration:24s; animation-delay:0.2s; }
    .particle:nth-child(15){ left:66%; animation-duration:14s; animation-delay:6.5s; width:3px; height:3px; }
    .particle:nth-child(16){ left:40%; animation-duration:19s; animation-delay:4.5s; }
    .particle:nth-child(17){ left:95%; animation-duration:15s; animation-delay:2s; }
    .particle:nth-child(18){ left:25%; animation-duration:23s; animation-delay:9s; width:2.5px; height:2.5px; }

    .bg-vignette{
      background:
        radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.16) 70%, rgba(0,0,0,.58) 100%);
      z-index:-4;
    }

    .bg-noise{
      opacity:.07;
      background-image:
        radial-gradient(rgba(255,255,255,.55) .5px, transparent .8px);
      background-size: 8px 8px;
      mix-blend-mode:soft-light;
      z-index:-3;
    }

    .stars canvas{
      width:100%;
      height:100%;
      display:block;
      z-index:-2;
    }

    /* Hero */
    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:48px 20px 124px;
      position:relative;
      z-index:2;
    }

    .hero-inner{
      width:min(860px, 100%);
      margin:0 auto;
      transform:translateY(-3vh);
    }

    /* Fade-in animations */
    .fade-up{
      opacity:0;
      transform:translateY(24px);
      animation: fadeUp .9s ease forwards;
    }
    .fade-up-1{ animation-delay:.1s; }
    .fade-up-2{ animation-delay:.3s; }
    .fade-up-3{ animation-delay:.5s; }
    .fade-up-4{ animation-delay:.7s; }

    h1{
      margin:0 auto 18px;
      max-width:720px;
      font-weight:650;
      font-size:clamp(2.6rem, 6.5vw, 5.2rem);
      line-height:.96;
      letter-spacing:-.06em;
      text-wrap:balance;
    }

    h1 .serif{
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-style:italic;
      font-weight:500;
      letter-spacing:-.04em;
    }

    .sub{
      margin:0 auto 34px;
      max-width:500px;
      color:var(--muted);
      font-size:clamp(.95rem, 1.8vw, 1.3rem);
      line-height:1.55;
      text-wrap:balance;
    }

    .signup{
      width:min(640px, 100%);
      margin:0 auto;
      padding:6px;
      display:flex;
      gap:8px;
      border-radius:18px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(15,20,31,.7), rgba(9,13,20,.58));
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 22px 50px rgba(0,0,0,.36),
        0 0 34px rgba(65,111,255,.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: box-shadow .3s ease, border-color .3s ease;
    }

    .signup:focus-within{
      border-color:rgba(100,140,255,.25);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05) inset,
        0 22px 50px rgba(0,0,0,.36),
        0 0 50px rgba(65,111,255,.14);
    }

    .signup input{
      flex:1;
      border:0;
      outline:0;
      min-width:0;
      background:transparent;
      color:var(--text);
      font-size:1.05rem;
      padding:18px 18px;
      border-radius:14px;
    }

    .signup input::placeholder{
      color:#a7afbc;
    }

    .signup button{
      border:0;
      cursor:pointer;
      border-radius:14px;
      padding:16px 26px;
      white-space:nowrap;
      font-size:1rem;
      font-weight:650;
      background:var(--button);
      color:var(--button-text);
      transition:transform .22s ease, box-shadow .22s ease, opacity .22s ease;
      box-shadow: 0 10px 24px rgba(255,255,255,.09);
    }

    .signup button:hover{
      transform:translateY(-1px);
      box-shadow: 0 16px 32px rgba(255,255,255,.12);
    }

    .signup button:active{
      transform:translateY(0);
    }

    /* Success state */
    .success-msg{
      display:none;
      flex-direction:column;
      align-items:center;
      gap:8px;
      margin-top:8px;
    }
    .success-msg .checkmark{
      width:48px; height:48px; border-radius:50%;
      background:rgba(74,222,128,.1);
      border:1px solid rgba(74,222,128,.3);
      display:flex; align-items:center; justify-content:center;
      font-size:22px; margin-bottom:4px;
    }
    .success-msg p{ color:var(--muted); font-size:1rem; margin:0; }
    .success-msg p strong{ color:var(--text); }

    /* Footer */
    .footer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:3;
      border-top:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(4,6,11,.0), rgba(4,6,11,.22) 30%, rgba(4,6,11,.66));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .footer-inner{
      max-width:1200px;
      margin:0 auto;
      padding:18px 22px 22px;
      color:#c5cad4;
      display:flex;
      gap:18px;
      align-items:center;
      justify-content:center;
      font-size:.92rem;
    }

    .footer a{
      color:#dfe5ee;
      text-decoration:none;
    }
    .footer a:hover{ text-decoration:underline; }
    .dot{ opacity:.45; }

    /* Horizon glow */
    .horizon{
      z-index:1;
      overflow:hidden;
    }

    .horizon::before{
      content:"";
      position:absolute;
      left:-12%;
      right:-12%;
      bottom:-17vh;
      height:34vh;
      border-radius:50%;
      background:
        radial-gradient(ellipse at center top, rgba(255,255,255,.95) 0%, rgba(255,255,255,.72) 9%, rgba(190,214,255,.28) 12%, rgba(74,113,208,.22) 20%, rgba(4,6,11,0) 42%);
      filter: blur(3px);
      animation:horizonFloat 9s ease-in-out infinite alternate;
      box-shadow:
        0 -24px 80px rgba(128,168,255,.14),
        0 -8px 32px rgba(255,255,255,.08);
    }

    .horizon::after{
      content:"";
      position:absolute;
      inset:auto -20% -28vh -20%;
      height:46vh;
      background:radial-gradient(ellipse at center top, rgba(122,160,255,.16), transparent 52%);
      filter: blur(28px);
      animation:horizonPulse 11s ease-in-out infinite alternate;
      opacity:.95;
    }

    /* Keyframes */
    @keyframes pulseGlow{
      from{transform:scale(1) translateY(0); opacity:.82}
      to{transform:scale(1.04) translateY(12px); opacity:1}
    }
    @keyframes horizonFloat{
      from{transform:translateY(0px) scaleX(1)}
      to{transform:translateY(10px) scaleX(1.02)}
    }
    @keyframes horizonPulse{
      from{transform:translateY(0); opacity:.75}
      to{transform:translateY(-8px); opacity:1}
    }
    @keyframes driftOne{
      from{transform:translate3d(-16px, 8px, 0) scale(1)}
      to{transform:translate3d(20px, -12px, 0) scale(1.08)}
    }
    @keyframes driftTwo{
      from{transform:translate3d(18px, -10px, 0) scale(.95)}
      to{transform:translate3d(-14px, 16px, 0) scale(1.07)}
    }
    @keyframes driftThree{
      from{transform:translate3d(0, 0, 0) scale(1) rotate(0deg)}
      to{transform:translate3d(30px, -20px, 0) scale(1.15) rotate(8deg)}
    }
    @keyframes driftFour{
      from{transform:translate3d(0, 0, 0) scale(1) rotate(0deg)}
      to{transform:translate3d(-25px, 15px, 0) scale(1.1) rotate(-6deg)}
    }
    @keyframes sweepLeft{
      from{transform:translate3d(-30px, 0, 0) rotate(-3deg) scale(1)}
      to{transform:translate3d(80px, -20px, 0) rotate(5deg) scale(1.2)}
    }
    @keyframes sweepRight{
      from{transform:translate3d(30px, 0, 0) rotate(2deg) scale(1)}
      to{transform:translate3d(-60px, 25px, 0) rotate(-4deg) scale(1.15)}
    }
    @keyframes shoot{
      0%{ opacity:0; transform:rotate(-35deg) translateX(0); }
      5%{ opacity:.8; }
      15%{ opacity:0; transform:rotate(-35deg) translateX(200px); }
      100%{ opacity:0; }
    }
    @keyframes floatUp{
      0%{
        transform:translateY(100vh) scale(0);
        opacity:0;
      }
      10%{
        opacity:1;
        transform:translateY(90vh) scale(1);
      }
      90%{
        opacity:1;
      }
      100%{
        transform:translateY(-10vh) scale(0);
        opacity:0;
      }
    }
    @keyframes fadeUp{
      from{ opacity:0; transform:translateY(24px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @media (max-width:720px){
      .hero{ padding-bottom:154px; }
      .hero-inner{ transform:none; }
      h1{ margin-bottom:14px; }
      .sub{ margin-bottom:24px; }
      .signup{
        flex-direction:column;
        padding:8px;
        border-radius:20px;
      }
      .signup input,
      .signup button{
        width:100%;
      }
      .footer-inner{
        flex-wrap:wrap;
        gap:10px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="aurora"></div>
  <div class="aurora-extra"></div>
  <div class="aurora-deep"></div>
  <div class="bg-vignette"></div>
  <div class="bg-noise"></div>
  <div class="stars"><canvas id="stars"></canvas></div>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  <div class="shooting-stars">
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
  </div>
  <div class="horizon"></div>

  <main class="hero">
    <div class="hero-inner">
      <h1 class="fade-up fade-up-1">
        Know what your<br />
        policy <span class="serif">actually</span><br />
        covers.
      </h1>
      <p class="sub fade-up fade-up-2">
        AI-powered insurance analysis that reads the fine print so you don't have to.
        Get clarity in seconds, not hours.
      </p>

      <div class="fade-up fade-up-3">
        <form class="signup" id="signupForm" onsubmit="return false;">
          <input type="email" id="emailInput" placeholder="Your Email Address" aria-label="Your Email Address" />
          <button type="button" onclick="handleSubmit()">Get Early Access</button>
        </form>
        <div class="success-msg" id="successMsg">
          <div class="checkmark">✓</div>
          <p><strong>You're on the list.</strong></p>
          <p>We'll notify you at launch.</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner fade-up fade-up-4">
      <span>Mypoli.ai</span>
      <span class="dot">•</span>
      <span>Contact <a href="mailto:shane@mypoli.ai">shane@mypoli.ai</a></span>
    </div>
  </footer>

  <script>
    /* ── Email handler ── */
    function handleSubmit() {
      const input = document.getElementById('emailInput');
      const email = input.value.trim();
      if (!email || !email.includes('@') || !email.includes('.')) {
        input.style.boxShadow = 'inset 0 0 0 2px #ef4444';
        setTimeout(() => input.style.boxShadow = 'none', 2000);
        return;
      }
      const subject = encodeURIComponent('MyPoli.ai Waitlist Signup');
      const body = encodeURIComponent('New waitlist signup: ' + email);
      const a = document.createElement('a');
      a.href = 'mailto:shane@mypoli.ai?subject=' + subject + '&body=' + body;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'flex';
    }
    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); handleSubmit(); }
    });

    /* ── Stars canvas ── */
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    let width = 0;
    let height = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let stars = [];
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.min(180, Math.max(90, Math.floor(width / 12)));
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height * 0.82,
        r: Math.random() * 1.6 + 0.25,
        alpha: Math.random() * 0.55 + 0.2,
        twinkle: Math.random() * 0.02 + 0.003,
        drift: Math.random() * 0.06 + 0.01,
        phase: Math.random() * Math.PI * 2,
      }));
    }

    function drawGlow() {
      const gradient = ctx.createRadialGradient(
        width * 0.5, height * 0.72, 0,
        width * 0.5, height * 0.72, Math.min(width, height) * 0.34
      );
      gradient.addColorStop(0, 'rgba(120, 160, 255, 0.20)');
      gradient.addColorStop(0.35, 'rgba(86, 126, 235, 0.12)');
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    function animate(t) {
      ctx.clearRect(0, 0, width, height);
      drawGlow();

      for (const s of stars) {
        s.phase += s.twinkle;
        s.y += s.drift;
        if (s.y > height * 0.84) s.y = -4;

        const mouseOffsetX = (mouse.x - width / 2) * 0.0035;
        const mouseOffsetY = (mouse.y - height / 2) * 0.002;
        const alpha = s.alpha + Math.sin(s.phase) * 0.18;

        ctx.beginPath();
        ctx.arc(s.x + mouseOffsetX, s.y + mouseOffsetY, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0.08, alpha)})`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(255,255,255,.35)';
        ctx.fill();
      }

      ctx.shadowBlur = 0;
      requestAnimationFrame(animate);
    }

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });
    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
